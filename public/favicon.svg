<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- wheel rim -->
  <circle cx="20" cy="14" r="12" fill="none" stroke="#2563eb" stroke-width="2"/>
  <!-- hub -->
  <circle cx="20" cy="14" r="2" fill="#2563eb"/>
  <!-- 6 spokes -->
  <line x1="20" y1="14" x2="20" y2="2"    stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="30.4" y2="8"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="30.4" y2="20" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="20" y2="26"   stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="9.6" y2="20"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="9.6" y2="8"   stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ground line from left edge to bottom of tyre -->
  <line x1="0" y1="26" x2="20" y2="26" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
</svg>
